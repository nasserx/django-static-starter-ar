name: ci

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run Django system checks
        run: python backend/manage.py check

      - name: Run Django app tests
        run: python backend/manage.py test app

      - name: Run standalone backend unit tests
        run: python -m unittest discover backend

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JavaScript syntax
        working-directory: frontend
        run: |
          node --check src/js/main.js
          node --check src/js/config.js

      - name: Validate HTML
        working-directory: frontend
        run: npx --yes html-validate@9 "*.html" "partials/*.html"
